<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedAI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  display: flex;
  height: 100vh;
  background: #0f172a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg, #020617, #0f172a);
  padding: 20px;
  border-right: 1px solid rgba(255,255,255,0.05);
}

.logo {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 30px;
}

.menu {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.menu div {
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.menu div:hover {
  background: rgba(255,255,255,0.08);
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  padding: 15px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-weight: 500;
}

/* CHAT */
#chat-container {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.message {
  max-width: 65%;
  padding: 12px 15px;
  border-radius: 12px;
  margin: 10px 0;
  line-height: 1.4;
}

.user {
  background: linear-gradient(45deg, #3b82f6, #06b6d4);
  align-self: flex-end;
}

.bot {
  background: #1e293b;
}

/* INPUT */
.input-area {
  display: flex;
  padding: 15px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1e293b;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: linear-gradient(45deg, #3b82f6, #06b6d4);
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* REMINDER PANEL */
.reminder {
  padding: 20px;
  border-top: 1px solid rgba(255,255,255,0.05);
}

.reminder input {
  margin-top: 10px;
  width: 100%;
}

.reminder button {
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">💊 MedAI</div>

  <div class="menu">
    <div>💬 Chat</div>
    <div>⏰ Reminders</div>
    <div>📊 History</div>
    <div>⚙ Settings</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">AI Medicine Assistant</div>

  <div id="chat-container"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ask about medicines...">
    <button onclick="startListening()">🎤</button>
    <button onclick="sendMessage()">Send</button>
  </div>

  <div class="reminder">
    <h4>Set Reminder</h4>
    <input type="text" id="medicine-name" placeholder="Medicine name">
    <input type="datetime-local" id="reminder-time">
    <button onclick="setReminder()">Set Reminder</button>
  </div>

</div>

<script>
const chat = document.getElementById('chat-container');
const input = document.getElementById('user-input');

const apiKey = "YOUR_API_KEY";
const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;

function addMessage(type, text) {
  const div = document.createElement('div');
  div.classList.add('message', type);
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;

  addMessage('user', msg);
  input.value = '';

  const res = await fetch(endpoint, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      contents: [{ parts: [{ text: `Explain medicine ${msg} briefly.` }] }]
    })
  });

  const data = await res.json();
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No info";

  addMessage('bot', reply.replace(/\n/g, "<br>"));
}

function setReminder() {
  const name = document.getElementById('medicine-name').value;
  const time = document.getElementById('reminder-time').value;

  const delay = new Date(time) - new Date();

  setTimeout(() => {
    alert(`💊 Take ${name}`);
    addMessage('bot', `⏰ Time to take <b>${name}</b>`);
  }, delay);

  addMessage('bot', `✅ Reminder set for ${name}`);
}

function startListening() {
  const rec = new webkitSpeechRecognition();
  rec.start();

  rec.onresult = e => {
    input.value = e.results[0][0].transcript;
  };
}
</script>

</body>
</html>
